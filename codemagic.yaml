
workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 120
    environment:
      flutter: stable
    scripts:
      - name: Unzip project
        script: unzip -o "live audio room zip(1).zip"
      - name: Build APK
        script: cd "live audio room zip(1)" && flutter pub get && flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: |
          cd "live audio room zip(...)"
          flutter pub get
      - name: Build APK
        script: |
          cd "live audio room zip(...)"
          flutter build apk --release
    artifacts:
      - build/**/app-release.apk
